<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>OutRun</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="game"></canvas>

  <!-- Tilt steering feedback meter (shown while tilt is enabled) -->
  <div id="tilt-meter">
    <div id="tilt-track"><div id="tilt-knob"></div></div>
    <div id="tilt-status">tilt: on</div>
  </div>

  <!-- On-screen controls (shown on touch devices) -->
  <div id="controls">
    <div class="pad pad-left">
      <button id="btn-left"  class="ctl" aria-label="Steer left">&#9664;</button>
      <button id="btn-right" class="ctl" aria-label="Steer right">&#9654;</button>
    </div>
    <div class="pad pad-right">
      <button id="btn-brake" class="ctl ctl-brake" aria-label="Brake">BRAKE</button>
      <button id="btn-gas"   class="ctl ctl-gas" aria-label="Accelerate">GAS</button>
    </div>
    <button id="btn-tilt"     class="ctl ctl-tilt"     aria-label="Toggle motion steering">MOTION</button>
    <button id="btn-settings" class="ctl ctl-settings" aria-label="Open settings">&#9881;</button>
  </div>

  <!-- Touch settings overlay (shown on touch devices when state=settings) -->
  <div id="touch-settings-ui"></div>

  <script type="module" src="main.js"></script>
</body>
</html>
